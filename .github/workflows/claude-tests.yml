name: Claude Hook Tests

on:
  push:
    paths:
      - 'modules/claude/**/*.py'
      - 'modules/claude/tests/**'
  pull_request:
    paths:
      - 'modules/claude/**/*.py'
      - 'modules/claude/tests/**'

jobs:
  test:
    name: pytest modules/claude/tests/
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.11'

      - name: Install pytest
        run: pip install pytest

      - name: Run Claude hook tests
        run: pytest modules/claude/tests/ -x --tb=short
